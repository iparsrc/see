---
- name: Install Docker, GitLab, and GitLab Runner on Ubuntu
  hosts: all
  become: yes

  vars:
    gitlab_external_url: "http://192.168.56.9"
    gitlab_student_repo_url: "http://student:xxcc0xxcc@192.168.56.9"

  tasks:
    ###########################################################################
    # Install Dependencies
    ###########################################################################
    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - git
        state: present
        update_cache: yes


    ###########################################################################
    # Install Docker
    ###########################################################################
    - name: Update repositories cache. 
      apt:
        update_cache: yes

    - name: Safe system upgrade via aptitude.
      apt: 
        upgrade: safe

    - name: Install packages required by Docker.
      apt:
        name: "{{ packages }}"
      vars:
        packages:
        - apt-transport-https
        - ca-certificates
        - curl
        - software-properties-common

    - name: Add Docker GPG apt Key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu focal stable
        state: present

    - name: Update repositories cache. 
      apt:
        update_cache: yes    
      
    - name: Install Docker packages. 
      apt:
        name: "{{ dockerpackages }}"
      vars:
        dockerpackages:
        - docker-ce 
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
        
    - name: Add users to docker group. 
      shell: "usermod -aG docker {{ item }}"
      with_items:
        - vagrant

    - name: Enable/start Docker
      service:
        name: docker
        state: started
        enabled: yes


    ###########################################################################
    # Install GitLab & Setup User and Repository
    ###########################################################################
    - name: Add GitLab repository installer script
      get_url:
        url: https://packages.gitlab.com/install/repositories/gitlab/gitlab-ce/script.deb.sh
        dest: /tmp/gitlab_install.sh
        mode: '0755'

    - name: Run GitLab repo installer
      command: bash /tmp/gitlab_install.sh

    - name: Install GitLab CE
      apt:
        name: gitlab-ce
        state: latest

    - name: Configure GitLab external URL
      lineinfile:
        path: /etc/gitlab/gitlab.rb
        regexp: "^external_url"
        line: "external_url '{{ gitlab_external_url }}'"

    - name: Reconfigure GitLab (runs chef automation)
      command: gitlab-ctl reconfigure

    - name: Create GitLab user 'student'
      command: >
        gitlab-rails runner "u = User.find_by(username: 'student'); unless u; admin = User.where(admin: true).first || User.first; params = { name: 'student', username: 'student', email: 'student@uni.lu', password: 'xxcc0xxcc', password_confirmation: 'xxcc0xxcc' }; Users::CreateService.new(admin, params).execute; end"

    - name: Configure Git global username
      git_config:
        name: user.name
        scope: global
        value: "student"

    - name: Configure Git global email
      git_config:
        name: user.email
        scope: global
        value: "student@uni.lu"

    - name: Clone 'see' repository from GitHub
      git:
        repo: "https://github.com/iparsrc/see.git"
        dest: /srv/see
        version: main
        force: yes

    - name: Ensure GitLab project 'see' exists for user 'student'
      command: >
        gitlab-rails runner "u = User.find_by(username: 'student'); p = Project.find_by_full_path('student/see'); unless p; Projects::CreateService.new(u, name: 'see', path: 'see').execute; end"

    - name: Point local 'see' repository to local GitLab remote
      command: git remote set-url origin "{{ gitlab_student_repo_url }}/student/see.git"
      args:
        chdir: /srv/see

    - name: Push 'see' repository to local GitLab
      command: git push -u origin main
      args:
        chdir: /srv/see


    ###########################################################################
    # Install GitLab Runner
    ###########################################################################
    - name: Add GitLab Runner repository installer script
      get_url:
        url: https://packages.gitlab.com/install/repositories/gitlab/gitlab-runner/script.deb.sh
        dest: /tmp/gitlab_runner_install.sh
        mode: '0755'

    - name: Run GitLab Runner repo installer
      command: bash /tmp/gitlab_runner_install.sh

    - name: Install GitLab Runner
      apt:
        name: gitlab-runner
        state: latest

    - name: Ensure GitLab Runner service is enabled and running
      service:
        name: gitlab-runner
        state: started
        enabled: yes

---
- name: Install Docker, GitLab, and GitLab Runner on Ubuntu
  hosts: all
  become: yes

  vars:
    gitlab_external_url: "http://192.168.56.9"

  tasks:
    ###########################################################################
    # Install Dependencies
    ###########################################################################
    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
        state: present
        update_cache: yes


    ###########################################################################
    # Install Docker
    ###########################################################################
    - name: Create Docker APT keyring directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key (ASCII armored)
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Convert Docker GPG key to keyring
      command: gpg --dearmor -o /etc/apt/keyrings/docker.gpg /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker APT repository (official)
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present
        filename: docker
        update_cache: yes

    - name: Install Docker Engine and plugins (upstream)
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Enable/start Docker
      service:
        name: docker
        state: started
        enabled: yes


    ###########################################################################
    # Install GitLab CE
    ###########################################################################
    - name: Add GitLab repository installer script
      get_url:
        url: https://packages.gitlab.com/install/repositories/gitlab/gitlab-ce/script.deb.sh
        dest: /tmp/gitlab_install.sh
        mode: '0755'

    - name: Run GitLab repo installer
      command: bash /tmp/gitlab_install.sh

    - name: Install GitLab CE
      apt:
        name: gitlab-ce
        state: latest

    - name: Configure GitLab external URL
      lineinfile:
        path: /etc/gitlab/gitlab.rb
        regexp: "^external_url"
        line: "external_url '{{ gitlab_external_url }}'"

    - name: Reconfigure GitLab (runs chef automation)
      command: gitlab-ctl reconfigure

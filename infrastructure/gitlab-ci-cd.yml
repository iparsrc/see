# create a pipeline only for dev and main branches
workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

stages:
  - deploy-staging

deploy_staging:
  stage: deploy-staging
  tags: [shell]
  script:
    - sudo mkdir -p /srv/app/staging
    - cd /srv/app/staging
    - sudo rm -rf see
    - sudo git clone http://192.168.56.9/student/see.git
    - cd see/infrastructure
    - sudo docker compose -f docker-compose.yml down
    - if [ "$(sudo docker ps -aq -f status=exited)" ]; then sudo docker rm $(sudo docker ps -aq -f status=exited); fi
    - sudo docker compose -f docker-compose.yml up -d --build
   
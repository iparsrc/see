# create a pipeline only for staging and main branches
workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "staging"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

stages:
  - backend-test
  - backend-build
  - frontend-test
  - frontend-build
  - deploy-dev
  - deploy-staging
  - deploy-prod

backend_test:
  stage: backend-test
  image: gradle:8.3
  tags: [docker]
  rules:
    - changes:
        - backend/**/*
  script:
    - cd backend && gradle clean check

backend_build:
  stage: backend-build
  image: gradle:8.3
  tags: [docker]
  rules:
    - changes:
        - backend/**/*
  script:
    - cd backend && gradle --build-cache clean build bootJar
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - backend/build/libs/*.jar

frontend_test:
  stage: frontend-test
  image: node:22
  tags: [docker]
  rules:
    - changes:
        - frontend/**/*
  script:
    - cd frontend && npm ci && npm run test --if-present

frontend_build:
  stage: frontend-build
  image: node:22
  tags: [docker]
  rules:
    - changes:
        - frontend/**/*
  script:
    - cd frontend && npm ci && npm run build
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - frontend/e4l.frontend.docker/web/dist/**

deploy_dev:
  stage: deploy-dev
  tags: [shell]
  script:
    - sudo mkdir -p /srv/app/dev
    - cd /srv/app/dev
    - sudo rm -rf see
    - sudo git clone --branch dev http://192.168.56.9/student/see.git
    - cd see/infrastructure
    - sudo docker compose -f docker-compose.dev.yml down
    - if [ "$(sudo docker ps -aq -f status=exited)" ]; then sudo docker rm $(sudo docker ps -aq -f status=exited); fi
    - sudo docker network inspect network-dev >/dev/null 2>&1 || sudo docker network create network-dev
    - sudo docker compose -f docker-compose.dev.yml up -d --build
  only:
    - dev

deploy_staging:
  stage: deploy-staging
  tags: [shell]
  script:
    - sudo mkdir -p /srv/app/staging
    - cd /srv/app/staging
    - sudo rm -rf see
    - sudo git clone --branch staging http://192.168.56.9/student/see.git
    - cd see/infrastructure
    - sudo docker compose -f docker-compose.staging.yml down
    - if [ "$(sudo docker ps -aq -f status=exited)" ]; then sudo docker rm $(sudo docker ps -aq -f status=exited); fi
    - sudo docker network inspect network-staging >/dev/null 2>&1 || sudo docker network create network-staging
    - sudo docker compose -f docker-compose.staging.yml up -d --build
  only:
    - staging

deploy_prod:
  stage: deploy-prod
  tags: [shell]
  script:
    - sudo mkdir -p /srv/app/prod
    - cd /srv/app/prod
    - sudo rm -rf see
    - sudo git clone --branch main http://192.168.56.9/student/see.git
    - cd see/infrastructure
    - sudo docker compose -f docker-compose.prod.yml down
    - if [ "$(sudo docker ps -aq -f status=exited)" ]; then sudo docker rm $(sudo docker ps -aq -f status=exited); fi
    - sudo docker network inspect network-prod >/dev/null 2>&1 || sudo docker network create network-prod
    - sudo docker compose -f docker-compose.prod.yml up -d --build
  only:
    - main

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

variables:
  # Required for Docker-in-Docker
  DOCKER_TLS_CERTDIR: ""
  GIT_STRATEGY: fetch
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2
  # Canonical image repo roots
  DOCKER_FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend"
  DOCKER_BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend"
  # Default fallback; overridden per-branch in jobs when tagging
  IMAGE_TAG: "$CI_COMMIT_REF_SLUG"

stages:
  - backend-build
  - backend-test
  - frontend-build
  - frontend-test
  - docker-build
  - deploy-staging
  - deploy-production

backend_build:
  stage: backend-build
  image: gradle:8.3
  tags: [docker]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      changes:
        - backend/**/*
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*
  script:
    - cd backend
    - gradle --build-cache clean build bootJar
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - backend/build/libs/*.jar

backend_test:
  stage: backend-test
  image: gradle:8.3
  tags: [docker]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      changes:
        - backend/**/*
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*
  script:
    - cd backend
    - gradle clean check

frontend_build:
  stage: frontend-build
  image: node:22
  tags: [docker]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      changes:
        - frontend/**/*
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - frontend/**/*
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - frontend/e4l.frontend.docker/web/dist/**

frontend_test:
  stage: frontend-test
  image: node:22
  tags: [docker]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      changes:
        - frontend/**/*
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - frontend/**/*
  script:
    - cd frontend
    - npm ci
    - npm run test --if-present

docker_build_frontend:
  stage: docker-build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  tags: [docker]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      changes:
        - frontend/**/*
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - frontend/**/*
  needs:
    - job: frontend_build
      artifacts: true
    - job: frontend_test
  script:
    - echo "$CI_JOB_TOKEN" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    # Derive environment tag
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        IMAGE_TAG="production"
      elif [ "$CI_COMMIT_BRANCH" = "dev" ]; then
        IMAGE_TAG="staging"
      else
        IMAGE_TAG="$CI_COMMIT_REF_SLUG"
      fi
      echo "Using frontend IMAGE_TAG=$IMAGE_TAG"
    # Build from the actual frontend Dockerfile context
    - docker build --pull -t "$DOCKER_FRONTEND_IMAGE:$IMAGE_TAG" -t "$DOCKER_FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA" ./frontend
    # Also tag 'latest' on main for convenience
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$DOCKER_FRONTEND_IMAGE:$IMAGE_TAG" "$DOCKER_FRONTEND_IMAGE:latest"
      fi
    # Push all tags
    - docker push "$DOCKER_FRONTEND_IMAGE:$IMAGE_TAG"
    - docker push "$DOCKER_FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker push "$DOCKER_FRONTEND_IMAGE:latest"
      fi

# Optional: backend image build (pushed with branch tag)
docker_build_backend:
  stage: docker-build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  tags: [docker]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      changes:
        - backend/**/*
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*
  needs:
    - job: backend_build
      artifacts: true
    - job: backend_test
  script:
    - echo "$CI_JOB_TOKEN" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - cd backend
    # Ensure the expected jar name exists for the Dockerfile (adjust if needed)
    - |
      JAR_SRC="$(ls build/libs/*.jar | head -n1)"
      echo "Using jar: $JAR_SRC"
      cp "$JAR_SRC" build/libs/e4l-server.jar
    # Derive environment tag
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        IMAGE_TAG="production"
      elif [ "$CI_COMMIT_BRANCH" = "dev" ]; then
        IMAGE_TAG="staging"
      else
        IMAGE_TAG="$CI_COMMIT_REF_SLUG"
      fi
      echo "Using backend IMAGE_TAG=$IMAGE_TAG"
    - docker build --pull -t "$DOCKER_BACKEND_IMAGE:$IMAGE_TAG" -t "$DOCKER_BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA" .
    # Also tag 'latest' on main for convenience
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$DOCKER_BACKEND_IMAGE:$IMAGE_TAG" "$DOCKER_BACKEND_IMAGE:latest"
      fi
    # Push all tags
    - docker push "$DOCKER_BACKEND_IMAGE:$IMAGE_TAG"
    - docker push "$DOCKER_BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker push "$DOCKER_BACKEND_IMAGE:latest"
      fi

deploy_staging:
  stage: deploy-staging
  image: alpine:3.20
  tags: [docker]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  # needs:
  #   - docker_build_frontend
  environment:
    name: staging
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - printf "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
  script:
    - ssh -p 22 vagrant@192.168.56.10 "mkdir -p /opt/see/frontend"
    - scp -P 22 -r frontend/e4l.frontend.docker vagrant@192.168.56.10:/opt/see/frontend/
    - >
      ssh -p 22 vagrant@192.168.56.10
      "echo '$CI_JOB_TOKEN' | docker login -u '$CI_REGISTRY_USER' --password-stdin '$CI_REGISTRY' &&
       cd /opt/see/frontend/e4l.frontend.docker &&
       (docker-compose -f docker-compose.frontend.staging.yml pull || docker compose -f docker-compose.frontend.staging.yml pull) &&
       (docker-compose -f docker-compose.frontend.staging.yml up -d || docker compose -f docker-compose.frontend.staging.yml up -d)"

deploy_production:
  stage: deploy-production
  image: alpine:3.20
  tags: [docker]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  # needs:
  #   - job: docker_build_frontend
      # optional: true
  environment:
    name: production
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - printf "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
  script:
    - ssh -p 22 vagrant@192.168.56.11 "mkdir -p /opt/see/frontend"
    - scp -P 22 -r frontend/e4l.frontend.docker vagrant@192.168.56.11:/opt/see/frontend/
    - >
      ssh -p 22 vagrant@192.168.56.11
      "echo '$CI_JOB_TOKEN' | docker login -u '$CI_REGISTRY_USER' --password-stdin '$CI_REGISTRY' &&
       cd /opt/see/frontend/e4l.frontend.docker &&
       (docker-compose -f docker-compose.frontend.prod.yml pull || docker compose -f docker-compose.frontend.prod.yml pull) &&
       (docker-compose -f docker-compose.frontend.prod.yml up -d || docker compose -f docker-compose.frontend.prod.yml up -d)"

# create a pipeline only for dev and main branches
workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

stages:
  - deploy-staging

deploy_staging:
  stage: deploy-staging
  tags: [shell]
  script:
    - echo "$CI_JOB_TOKEN" | docker login -u gitlab-ci-token --password-stdin "$CI_REGISTERY"
    - echo "Hello world"
